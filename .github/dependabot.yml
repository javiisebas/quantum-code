# Automated dependency updates + security PRs.
# Pairs with GitHub "Dependabot alerts" + "automated security fixes" (enabled at
# repo level): alerts surface CVEs, and Dependabot opens a PR bumping the fix.
version: 2
updates:
  # --- Application dependencies (pnpm / npm ecosystem) ---
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
    groups:
      # Collapse routine minor/patch bumps into a single PR to cut review noise.
      # Majors and security fixes still come as their own PRs so they get attention.
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  # --- CI workflow actions (kept pinned to SHAs; Dependabot bumps the SHA + comment) ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
    commit-message:
      prefix: ci(actions)
